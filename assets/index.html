<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBW - AZAD - Checklist</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:,">
</head>
<body>
<div class="container">
<header>
  <div class="top-row">
    <h1>CBW &mdash; AZAD &mdash; Checklist</h1>
    <div class="right-group">
      <a href="https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/az-104" target="_blank" class="study-link">AZ-104 Study Guide</a>
      <div class="lang-toggle">
        <button id="btnLangEn" class="active" onclick="setLang('en')">EN</button>
        <button id="btnLangDe" onclick="setLang('de')">DE</button>
        <button id="btnLangAr" onclick="setLang('ar')">عربي</button>
        <button id="btnLangEs" onclick="setLang('es')">ES</button>
        <button id="btnTheme" onclick="toggleTheme()">◐</button>
        <button id="btnCollapse" onclick="collapseAll()" title="Collapse all">▲</button>
        <button id="btnExpand" onclick="expandAll()" title="Expand all">▼</button>
        <button id="btnReset" onclick="resetStorage()" title="Reset saved data">↺</button>
      </div>
    </div>
  </div>
</header>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText"></div>
<div id="checklistRoot"></div>
</div>
<script src="script.js"></script>
</body>
</html>
